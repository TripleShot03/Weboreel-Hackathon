<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personality Animal Test 🐾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --pastel-blue: #a8d8ea;
    --pastel-pink: #ffb3c6;
    --pastel-yellow: #fff3b0;
    --pastel-mint: #b5ead7;
    --pastel-purple: #c9b1ff;
    --pastel-orange: #ffd3a5;
    --deep-blue: #5b8fb9;
    --deep-pink: #e87ea1;
    --deep-yellow: #f9c74f;
    --deep-mint: #52b788;
    --deep-purple: #8b5cf6;
    --text-dark: #3d2c5e;
    --text-mid: #5e4b7b;
    --white: #ffffff;
    --radius: 24px;
    --shadow: 0 8px 32px rgba(100,80,160,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #e0c3fc 0%, #a8d8ea 40%, #b5ead7 70%, #ffb3c6 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    overflow-x: hidden;
    color: var(--text-dark);
  }

  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ───────── FLOATING SHAPES ───────── */
  .floaters { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .floater {
    position: absolute;
    border-radius: 50%;
    opacity: 0.35;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.35; }
    50%  { opacity: 0.55; }
    100% { transform: translateY(-110vh) rotate(360deg) scale(1.15); opacity: 0; }
  }
  .paw { position: absolute; font-size: 22px; animation: pawFloat ease-in-out infinite; opacity: 0.55; }
  @keyframes pawFloat {
    0%,100% { transform: translateY(0) rotate(-10deg); }
    50%      { transform: translateY(-18px) rotate(10deg); }
  }
  .heart { position: absolute; font-size: 18px; animation: heartPop ease-in-out infinite; }
  @keyframes heartPop {
    0%,100% { transform: scale(1) translateY(0); opacity: 0.7; }
    50%      { transform: scale(1.3) translateY(-10px); opacity: 1; }
  }

  /* ───────── SCREEN MANAGER ───────── */
  .screen {
    display: none;
    min-height: 100vh;
    padding: 24px 16px 48px;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }
  .screen.active { display: flex; }

  /* ───────── WELCOME SCREEN ───────── */
  .welcome-card {
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 48px 36px 40px;
    max-width: 500px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow), 0 2px 0 rgba(255,255,255,0.9) inset;
    border: 2px solid rgba(255,255,255,0.7);
    animation: cardIn 0.7s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes cardIn {
    from { transform: translateY(50px) scale(0.9); opacity: 0; }
    to   { transform: translateY(0) scale(1);       opacity: 1; }
  }
  .welcome-emoji { font-size: 72px; margin-bottom: 16px; display: block; animation: bounce 1.4s ease-in-out infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }
  .welcome-card h1 {
    font-size: clamp(1.6rem, 5vw, 2.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #8b5cf6, #e87ea1, #f9c74f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 14px;
  }
  .welcome-card p {
    font-size: 1.05rem;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* ───────── BUTTONS ───────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 36px;
    font-size: 1.15rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: rgba(255,255,255,0.2);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover::after { opacity: 1; }
  .btn:hover { transform: translateY(-3px) scale(1.04); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #8b5cf6, #e87ea1);
    color: white;
    box-shadow: 0 6px 24px rgba(139,92,246,0.4);
  }
  .btn-primary:hover { box-shadow: 0 10px 32px rgba(139,92,246,0.55); }

  .btn-secondary {
    background: linear-gradient(135deg, #52b788, #a8d8ea);
    color: white;
    box-shadow: 0 6px 24px rgba(82,183,136,0.3);
  }
  .btn-share {
    background: linear-gradient(135deg, #f9c74f, #f77f00);
    color: white;
    box-shadow: 0 6px 24px rgba(249,199,79,0.4);
  }

  /* ───────── QUIZ SCREEN ───────── */
  .quiz-card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(14px);
    border-radius: 32px;
    padding: 40px 32px;
    max-width: 520px;
    width: 100%;
    box-shadow: var(--shadow);
    border: 2px solid rgba(255,255,255,0.75);
    animation: slideIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideIn {
    from { transform: translateX(60px) scale(0.95); opacity: 0; }
    to   { transform: translateX(0) scale(1);       opacity: 1; }
  }
  @keyframes slideOut {
    from { transform: translateX(0) scale(1);       opacity: 1; }
    to   { transform: translateX(-60px) scale(0.95); opacity: 0; }
  }
  .quiz-card.leaving { animation: slideOut 0.35s ease forwards; }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .progress-bar {
    flex: 1;
    height: 10px;
    background: rgba(180,150,255,0.2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #8b5cf6, #e87ea1);
    transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .progress-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--deep-purple);
    white-space: nowrap;
  }

  .question-emoji { font-size: 48px; text-align: center; margin-bottom: 12px; display: block; animation: wobble 2s ease-in-out infinite; }
  @keyframes wobble {
    0%,100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg); }
  }
  .question-text {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text-dark);
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.4;
  }

  .options-grid {
    display: grid;
    gap: 14px;
  }
  .option-btn {
    background: rgba(255,255,255,0.7);
    border: 2.5px solid rgba(180,150,255,0.25);
    border-radius: 18px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    color: var(--text-dark);
    transition: all 0.22s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover {
    background: rgba(139,92,246,0.1);
    border-color: #8b5cf6;
    transform: translateX(6px) scale(1.02);
    box-shadow: 0 4px 18px rgba(139,92,246,0.18);
  }
  .option-btn.selected {
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(232,126,161,0.1));
    border-color: #8b5cf6;
    transform: scale(1.03);
    box-shadow: 0 6px 22px rgba(139,92,246,0.25);
  }
  .option-icon { font-size: 1.4rem; flex-shrink: 0; }

  /* ───────── RESULT SCREEN ───────── */
  .result-card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(14px);
    border-radius: 32px;
    padding: 48px 36px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow);
    border: 2px solid rgba(255,255,255,0.7);
    animation: popIn 0.7s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.7) rotate(-5deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .result-animal { font-size: 88px; display: block; margin-bottom: 8px; }
  .result-name {
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--deep-purple), var(--deep-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .result-desc {
    font-size: 1.1rem;
    color: var(--text-mid);
    line-height: 1.65;
    margin-bottom: 32px;
    padding: 0 8px;
  }
  .result-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .badge {
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 700;
    background: rgba(139,92,246,0.12);
    color: var(--deep-purple);
    border: 1.5px solid rgba(139,92,246,0.2);
  }
  .result-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

  /* ───────── MUTE BUTTON ───────── */
  .mute-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 999;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
    border: none;
    border-radius: 50px;
    padding: 10px 18px;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(100,80,160,0.15);
    transition: transform 0.18s, box-shadow 0.18s;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: var(--text-dark);
  }
  .mute-btn:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(100,80,160,0.25); }

  /* ───────── CONFETTI ───────── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ───────── RESULT ANIMATIONS ───────── */
  .anim-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 32px;
    z-index: 0;
  }
  .result-card { position: relative; }
  .result-inner { position: relative; z-index: 1; }
  .leaf { position: absolute; font-size: 20px; animation: leafFall linear infinite; opacity: 0.6; }
  @keyframes leafFall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(120%) rotate(360deg); opacity: 0; }
  }
  .spark { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: #f9c74f; animation: sparkPop ease-out infinite; }
  @keyframes sparkPop {
    0%   { transform: scale(0); opacity: 1; }
    100% { transform: scale(3) translate(var(--dx), var(--dy)); opacity: 0; }
  }
  .ripple { position: absolute; border: 3px solid rgba(82,183,136,0.4); border-radius: 50%; animation: rippleGrow ease-out infinite; }
  @keyframes rippleGrow {
    0%   { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }
  .ray { position: absolute; background: rgba(249,199,79,0.25); width: 4px; transform-origin: bottom center; animation: rayGlow ease-in-out infinite alternate; }
  @keyframes rayGlow {
    0%   { opacity: 0.2; height: 60px; }
    100% { opacity: 0.7; height: 100px; }
  }

  /* Loading dots */
  .loading { text-align:center; padding:60px 0; }
  .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin:0 5px; animation:dotPulse 1.2s ease-in-out infinite; }
  .dot:nth-child(1){ background:#8b5cf6; animation-delay:0; }
  .dot:nth-child(2){ background:#e87ea1; animation-delay:0.2s; }
  .dot:nth-child(3){ background:#f9c74f; animation-delay:0.4s; }
  @keyframes dotPulse {
    0%,80%,100%{ transform:scale(0.6); opacity:0.5; }
    40%{ transform:scale(1.2); opacity:1; }
  }

  @media (max-width: 480px) {
    .welcome-card, .quiz-card, .result-card { padding: 32px 22px; border-radius: 24px; }
    .btn { padding: 14px 24px; font-size: 1rem; }
    .question-text { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- Floating background decorations -->
<div class="floaters" id="floaters"></div>

<!-- Mute toggle -->
<button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 Music</button>

<!-- ══════ SCREEN 1: WELCOME ══════ -->
<div class="screen active" id="screenWelcome">
  <div class="welcome-card">
    <span class="welcome-emoji">🐾</span>
    <h1>Discover Your Animal Personality!</h1>
    <p>Answer 5 fun questions and find out which animal matches your true personality. Are you a chill panda or a bold lion? 🦁🐼</p>
    <button class="btn btn-primary" onclick="startQuiz()">
      🎉 Start Quiz
    </button>
  </div>
</div>

<!-- ══════ SCREEN 2: QUIZ ══════ -->
<div class="screen" id="screenQuiz">
  <div class="quiz-card" id="quizCard">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">1 / 5</span>
    </div>
    <span class="question-emoji" id="qEmoji">🌟</span>
    <p class="question-text" id="questionText">Loading…</p>
    <div class="options-grid" id="optionsGrid"></div>
  </div>
</div>

<!-- ══════ SCREEN 3: RESULT ══════ -->
<div class="screen" id="screenResult">
  <div class="result-card" id="resultCard">
    <div class="anim-layer" id="animLayer"></div>
    <div class="result-inner">
      <span class="result-animal" id="resultAnimal">🐼</span>
      <div class="result-name" id="resultName">Chill Panda</div>
      <p class="result-desc" id="resultDesc">You are calm and cool!</p>
      <div class="result-badges" id="resultBadges"></div>
      <div class="result-btns">
        <button class="btn btn-secondary" onclick="restartQuiz()">🔄 Play Again</button>
        <button class="btn btn-share" onclick="shareResult()">📤 Share My Animal</button>
      </div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────────────────────────────────────
const questions = [
  {
    emoji: "🌅",
    text: "What is your perfect weekend?",
    options: [
      { emoji: "🛋️", text: "Relaxing at home", animal: "panda" },
      { emoji: "🌍", text: "Exploring new places", animal: "fox" },
      { emoji: "🎉", text: "Leading a fun event", animal: "lion" },
      { emoji: "🍿", text: "Watching movies & chilling", animal: "turtle" }
    ]
  },
  {
    emoji: "💎",
    text: "What is your biggest strength?",
    options: [
      { emoji: "😌", text: "Calmness", animal: "panda" },
      { emoji: "🧠", text: "Intelligence", animal: "fox" },
      { emoji: "💪", text: "Courage", animal: "lion" },
      { emoji: "🐢", text: "Patience", animal: "turtle" }
    ]
  },
  {
    emoji: "🗺️",
    text: "What environment do you love most?",
    options: [
      { emoji: "🌿", text: "Bamboo forest", animal: "panda" },
      { emoji: "🌲", text: "Quiet forest", animal: "fox" },
      { emoji: "🦁", text: "Open savannah", animal: "lion" },
      { emoji: "🌊", text: "Peaceful pond", animal: "turtle" }
    ]
  },
  {
    emoji: "👥",
    text: "How do friends describe you?",
    options: [
      { emoji: "☁️", text: "Relaxed & peaceful", animal: "panda" },
      { emoji: "✨", text: "Smart & clever", animal: "fox" },
      { emoji: "🔥", text: "Brave & bold", animal: "lion" },
      { emoji: "🌿", text: "Easygoing & chill", animal: "turtle" }
    ]
  },
  {
    emoji: "⚡",
    text: "What would you do facing a challenge?",
    options: [
      { emoji: "🧘", text: "Stay calm & breathe", animal: "panda" },
      { emoji: "💡", text: "Think of a clever solution", animal: "fox" },
      { emoji: "🗡️", text: "Face it boldly", animal: "lion" },
      { emoji: "🐚", text: "Take it slow & steady", animal: "turtle" }
    ]
  }
];

const animals = {
  panda: {
    emoji: "🐼",
    name: "Chill Panda",
    desc: "You are calm, relaxed, and enjoy peaceful moments in life. You find joy in simple things and your peaceful energy makes everyone around you feel at ease.",
    badges: ["Calm 🌸", "Peaceful 🍃", "Gentle 💚", "Zen Master 🧘"],
    anim: "bamboo"
  },
  fox: {
    emoji: "🦊",
    name: "Clever Fox",
    desc: "You are intelligent, quick-thinking, and love solving problems. Your wit and creativity make you a natural innovator who always finds a way through any maze.",
    badges: ["Smart 🧠", "Witty ✨", "Creative 💫", "Problem Solver 🔮"],
    anim: "sparks"
  },
  lion: {
    emoji: "🦁",
    name: "Bold Lion",
    desc: "You are confident, brave, and love leading others. Your natural charisma and fearless attitude inspire everyone around you to be their best.",
    badges: ["Brave 🔥", "Leader 👑", "Confident 💪", "Fearless ⚡"],
    anim: "rays"
  },
  turtle: {
    emoji: "🐢",
    name: "Relaxed Turtle",
    desc: "You are patient, thoughtful, and believe in steady progress. You carry your home within you — your inner peace and wisdom guide you through every storm.",
    badges: ["Patient 🌊", "Wise 🐚", "Steady 🌿", "Deep Thinker 💙"],
    anim: "ripples"
  }
};

// ──────────────────────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────────────────────
let currentQ = 0;
let scores = { panda: 0, fox: 0, lion: 0, turtle: 0 };
let muted = false;
let musicStarted = false;
let audioCtx = null;

// ──────────────────────────────────────────────────────────────────────────────
// AUDIO (Web Audio API — no external files needed)
// ──────────────────────────────────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type = 'sine', duration = 0.12, vol = 0.18, delay = 0) {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = type;
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t);
    osc.stop(t + duration + 0.05);
  } catch(e) {}
}

function playClick() {
  playTone(880, 'sine', 0.08, 0.2);
  playTone(1100, 'sine', 0.06, 0.12, 0.06);
}

function playSelect() {
  [523, 659, 784].forEach((f,i) => playTone(f, 'sine', 0.14, 0.15, i*0.07));
}

function playCelebration() {
  const melody = [523,659,784,1047,988,784,659,784,1047];
  melody.forEach((f,i) => playTone(f, 'sine', 0.18, 0.22, i*0.11));
}

let musicInterval = null;
let musicPhase = 0;
const musicNotes = [261,293,329,349,392,440,493,523,493,440,392,349,329,293];

function startMusic() {
  if (musicStarted || muted) return;
  musicStarted = true;
  function playNextNote() {
    if (!muted) {
      const note = musicNotes[musicPhase % musicNotes.length];
      playTone(note, 'sine', 0.55, 0.07);
      if (musicPhase % 2 === 0) playTone(note * 0.5, 'sine', 0.55, 0.04);
    }
    musicPhase++;
    musicInterval = setTimeout(playNextNote, 380);
  }
  playNextNote();
}

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇 Music' : '🔊 Music';
  if (!muted && !musicStarted) startMusic();
}

// ──────────────────────────────────────────────────────────────────────────────
// FLOATING BACKGROUND DECORATIONS
// ──────────────────────────────────────────────────────────────────────────────
function buildFloaters() {
  const wrap = document.getElementById('floaters');
  const colors = ['#ffb3c6','#b5ead7','#a8d8ea','#fff3b0','#c9b1ff','#ffd3a5'];
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'floater';
    const size = 18 + Math.random() * 48;
    d.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*12}s;
      animation-delay:${-Math.random()*10}s;
    `;
    wrap.appendChild(d);
  }
  const paws = ['🐾','🌸','⭐','🍀','💫','🌺'];
  const hearts = ['💕','💛','💙','💚','💜','🧡'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'paw';
    p.textContent = paws[Math.floor(Math.random()*paws.length)];
    p.style.cssText = `left:${Math.random()*100}%;top:${20+Math.random()*70}%;animation-duration:${3+Math.random()*4}s;animation-delay:${-Math.random()*4}s;`;
    wrap.appendChild(p);
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*80}%;animation-duration:${2.5+Math.random()*3}s;animation-delay:${-Math.random()*3}s;`;
    wrap.appendChild(h);
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// SCREENS
// ──────────────────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ──────────────────────────────────────────────────────────────────────────────
// QUIZ LOGIC
// ──────────────────────────────────────────────────────────────────────────────
function startQuiz() {
  playClick();
  startMusic();
  currentQ = 0;
  scores = { panda: 0, fox: 0, lion: 0, turtle: 0 };
  showScreen('screenQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('questionText').textContent = q.text;
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentQ+1} / ${questions.length}`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-icon">${opt.emoji}</span><span>${opt.text}</span>`;
    btn.style.animationDelay = (i * 0.07) + 's';
    btn.addEventListener('click', () => selectOption(btn, opt.animal));
    grid.appendChild(btn);
  });
}

function selectOption(btn, animal) {
  if (btn.classList.contains('selected')) return;
  playSelect();
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  scores[animal]++;

  setTimeout(() => {
    const card = document.getElementById('quizCard');
    card.classList.add('leaving');
    setTimeout(() => {
      card.classList.remove('leaving');
      currentQ++;
      if (currentQ >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }, 350);
  }, 320);
}

// ──────────────────────────────────────────────────────────────────────────────
// RESULT
// ──────────────────────────────────────────────────────────────────────────────
function showResult() {
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const animal = animals[winner];

  document.getElementById('resultAnimal').textContent = animal.emoji;
  document.getElementById('resultName').textContent = animal.name;
  document.getElementById('resultDesc').textContent = animal.desc;
  const badges = document.getElementById('resultBadges');
  badges.innerHTML = animal.badges.map(b => `<span class="badge">${b}</span>`).join('');

  buildResultAnimation(animal.anim);

  showScreen('screenResult');
  setTimeout(() => { playCelebration(); launchConfetti(); }, 400);
}

function buildResultAnimation(type) {
  const layer = document.getElementById('animLayer');
  layer.innerHTML = '';

  if (type === 'bamboo') {
    const leaves = ['🌿','🍃','🌱','🎋'];
    for (let i = 0; i < 10; i++) {
      const l = document.createElement('div');
      l.className = 'leaf';
      l.textContent = leaves[Math.floor(Math.random()*leaves.length)];
      l.style.cssText = `left:${Math.random()*100}%;animation-duration:${3+Math.random()*4}s;animation-delay:${-Math.random()*4}s;font-size:${14+Math.random()*14}px;`;
      layer.appendChild(l);
    }
  } else if (type === 'sparks') {
    for (let i = 0; i < 12; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const dx = (Math.random()*60-30) + 'px';
      const dy = (Math.random()*60-30) + 'px';
      s.style.cssText = `left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;--dx:${dx};--dy:${dy};animation-duration:${0.8+Math.random()*1.2}s;animation-delay:${Math.random()*2}s;background:${['#f9c74f','#ffd3a5','#e87ea1','#c9b1ff'][Math.floor(Math.random()*4)]};`;
      layer.appendChild(s);
    }
  } else if (type === 'rays') {
    for (let i = 0; i < 10; i++) {
      const r = document.createElement('div');
      r.className = 'ray';
      r.style.cssText = `left:50%;bottom:0;width:3px;height:80px;transform-origin:bottom center;transform:rotate(${i*36}deg) translateX(-50%);animation-delay:${i*0.1}s;`;
      layer.appendChild(r);
    }
  } else if (type === 'ripples') {
    for (let i = 0; i < 4; i++) {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.cssText = `left:50%;top:50%;width:60px;height:60px;margin:-30px 0 0 -30px;animation-duration:${1.5+i*0.4}s;animation-delay:${i*0.35}s;border-color:rgba(82,183,136,${0.4-i*0.08});`;
      layer.appendChild(r);
    }
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// CONFETTI
// ──────────────────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#ffb3c6','#a8d8ea','#b5ead7','#fff3b0','#c9b1ff','#ffd3a5','#f9c74f','#8b5cf6'];
  for (let i = 0; i < 70; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 8 + Math.random() * 10;
    c.style.cssText = `
      left:${Math.random()*100}vw;
      top:-20px;
      width:${size}px;
      height:${size}px;
      background:${color};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*1.2}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// SHARE & RESTART
// ──────────────────────────────────────────────────────────────────────────────
function restartQuiz() {
  playClick();
  document.getElementById('animLayer').innerHTML = '';
  startQuiz();
}

function shareResult() {
  playClick();
  const name = document.getElementById('resultName').textContent;
  const emoji = document.getElementById('resultAnimal').textContent;
  const text = `I just took the Personality Animal Test and I'm a ${emoji} ${name}! 🎉 Discover your animal personality too!`;
  if (navigator.share) {
    navigator.share({ title: 'Personality Animal Test', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-share');
      const orig = btn.innerHTML;
      btn.innerHTML = '✅ Copied!';
      setTimeout(() => btn.innerHTML = orig, 2000);
    });
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────────────────────
buildFloaters();
</script>
