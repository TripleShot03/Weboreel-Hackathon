<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Fortune Teller 🔮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #f5c842;
    --purple: #7b2fff;
    --violet: #b44fff;
    --dark: #050510;
    --card-bg: linear-gradient(135deg, #1a0a2e, #0d0520);
  }

  body {
    background: #050510;
    color: #e0d0ff;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── Stars Background ─── */
  #starfield {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* ─── Floating Particles ─── */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    animation: float var(--fd, 8s) ease-in-out infinite var(--fdelay, 0s);
    opacity: 0;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.4; }
    100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
  }

  /* ─── Main Layout ─── */
  #app {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* ─── Title ─── */
  #title-block { text-align: center; margin-bottom: 2rem; animation: fadeDown 1s ease; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

  h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    background: linear-gradient(135deg, #f5c842, #b44fff, #f5c842);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    letter-spacing: 2px;
    text-shadow: none;
  }
  @keyframes shimmer { 0% { background-position: 0% } 100% { background-position: 200% } }

  .subtitle {
    font-size: 1rem; color: #b89fd8; margin-top: 0.5rem;
    font-style: italic; letter-spacing: 1px;
  }

  /* ─── Crystal Ball ─── */
  #ball-wrap {
    position: relative; width: 200px; height: 200px;
    margin: 1rem auto 2rem; cursor: pointer;
    animation: float-ball 4s ease-in-out infinite;
  }
  @keyframes float-ball {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  #crystal-ball {
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #5533aa 0%, #1a0840 55%, #0a0420 100%);
    box-shadow:
      0 0 30px 10px rgba(120,60,255,0.4),
      0 0 60px 20px rgba(120,60,255,0.2),
      inset 0 0 40px rgba(200,150,255,0.15),
      inset -20px -20px 60px rgba(0,0,0,0.5);
    position: relative; overflow: hidden;
    transition: all 0.5s ease;
  }
  #crystal-ball::before {
    content: '';
    position: absolute; top: 15%; left: 20%;
    width: 35%; height: 25%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
    border-radius: 50%;
    transform: rotate(-25deg);
  }
  #crystal-ball::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 60% 60%, rgba(80,0,180,0.3) 0%, transparent 60%);
    animation: swirl 6s linear infinite;
  }
  @keyframes swirl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  #crystal-ball.active {
    box-shadow:
      0 0 60px 25px rgba(180,79,255,0.7),
      0 0 100px 40px rgba(120,60,255,0.4),
      0 0 160px 60px rgba(245,200,66,0.2),
      inset 0 0 60px rgba(220,180,255,0.3);
    animation: pulse-ball 0.6s ease-in-out infinite;
  }
  @keyframes pulse-ball {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .ball-sparkles {
    position: absolute; inset: -20px; pointer-events: none;
    animation: spin-sparkles 3s linear infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .ball-sparkles.show { opacity: 1; }
  @keyframes spin-sparkles { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .sparkle-dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }

  .ball-pedestal {
    width: 120px; height: 14px;
    background: linear-gradient(90deg, transparent, #4a2080, #7b2fff, #4a2080, transparent);
    border-radius: 50%;
    margin: 0 auto;
    box-shadow: 0 0 20px rgba(123,47,255,0.5);
  }

  /* ─── Input Area ─── */
  #input-section {
    width: 100%; max-width: 500px; text-align: center;
    animation: fadeUp 1.2s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  #question-input {
    width: 100%;
    padding: 1rem 1.25rem;
    background: rgba(123,47,255,0.12);
    border: 1px solid rgba(180,79,255,0.4);
    border-radius: 50px;
    color: #e0d0ff;
    font-size: 1rem;
    font-family: 'Georgia', serif;
    outline: none;
    transition: all 0.3s;
    text-align: center;
  }
  #question-input::placeholder { color: #7a6090; }
  #question-input:focus {
    border-color: var(--violet);
    box-shadow: 0 0 20px rgba(180,79,255,0.3);
    background: rgba(123,47,255,0.2);
  }

  #reveal-btn {
    margin-top: 1.25rem;
    padding: 0.85rem 2.5rem;
    background: linear-gradient(135deg, #7b2fff, #b44fff);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 1.1rem;
    font-family: 'Georgia', serif;
    letter-spacing: 1px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 0 20px rgba(123,47,255,0.4);
  }
  #reveal-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 35px rgba(180,79,255,0.6);
  }
  #reveal-btn:active { transform: scale(0.97); }
  #reveal-btn::before {
    content: '';
    position: absolute; inset: -2px;
    background: linear-gradient(135deg, #f5c842, #b44fff, #7b2fff, #f5c842);
    background-size: 300%;
    border-radius: 50px;
    z-index: -1;
    animation: border-glow 3s linear infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #reveal-btn:hover::before { opacity: 1; }
  @keyframes border-glow { 0% { background-position: 0% } 100% { background-position: 300% } }

  /* ─── Tarot Card ─── */
  #card-area {
    width: 100%; max-width: 380px; margin: 2rem auto;
    perspective: 1000px;
    display: none;
  }
  #card-area.show { display: block; }
  .tarot-card {
    width: 100%; padding-top: 160%;
    position: relative;
    transform-style: preserve-3d;
    animation: card-flip 1s ease forwards;
  }
  @keyframes card-flip {
    0% { transform: rotateY(180deg) scale(0.8); opacity: 0; }
    60% { transform: rotateY(-10deg) scale(1.02); opacity: 1; }
    100% { transform: rotateY(0deg) scale(1); opacity: 1; }
  }
  .card-face {
    position: absolute; inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    overflow: hidden;
  }
  .card-front {
    background: linear-gradient(160deg, #1a0a2e 0%, #0d0520 40%, #1a0535 100%);
    border: 1px solid rgba(180,79,255,0.5);
    box-shadow: 0 0 40px rgba(123,47,255,0.4), 0 20px 60px rgba(0,0,0,0.6);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .card-front::before {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: 12px;
    pointer-events: none;
  }

  .card-symbol {
    font-size: 4rem; margin-bottom: 1rem;
    animation: symbol-glow 2s ease-in-out infinite;
  }
  @keyframes symbol-glow {
    0%,100% { filter: drop-shadow(0 0 8px rgba(245,200,66,0.5)); }
    50% { filter: drop-shadow(0 0 20px rgba(245,200,66,0.9)); }
  }

  .card-title {
    font-size: 0.85rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .card-divider {
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.5rem auto 1rem;
  }

  .prediction-text {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #d8c8f0;
    font-style: italic;
  }

  .card-footer {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: rgba(180,79,255,0.6);
    text-transform: uppercase;
  }

  /* ─── Corner Stars Decoration ─── */
  .card-corner {
    position: absolute; font-size: 1.2rem; opacity: 0.5;
  }
  .card-corner.tl { top: 12px; left: 14px; }
  .card-corner.tr { top: 12px; right: 14px; }
  .card-corner.bl { bottom: 12px; left: 14px; }
  .card-corner.br { bottom: 12px; right: 14px; }

  /* ─── Action Buttons ─── */
  #action-btns {
    display: none; flex-direction: column; align-items: center;
    gap: 0.75rem; margin-top: 1rem; width: 100%; max-width: 380px;
  }
  #action-btns.show { display: flex; }

  .action-btn {
    width: 100%;
    padding: 0.75rem 1.5rem;
    border-radius: 50px;
    font-size: 0.95rem;
    font-family: 'Georgia', serif;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
  }
  #share-btn {
    background: rgba(245,200,66,0.15);
    border: 1px solid rgba(245,200,66,0.4);
    color: var(--gold);
  }
  #share-btn:hover {
    background: rgba(245,200,66,0.25);
    box-shadow: 0 0 20px rgba(245,200,66,0.3);
  }
  #again-btn {
    background: rgba(123,47,255,0.2);
    border: 1px solid rgba(180,79,255,0.4);
    color: #c8a0f0;
  }
  #again-btn:hover {
    background: rgba(123,47,255,0.35);
    box-shadow: 0 0 20px rgba(123,47,255,0.3);
  }

  /* ─── Toast ─── */
  #toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: rgba(123,47,255,0.9);
    color: #fff; padding: 0.75rem 2rem;
    border-radius: 50px;
    font-size: 0.9rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
    z-index: 100;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(180,79,255,0.5);
  }
  #toast.show { opacity: 1; }

  /* ─── Mute Button ─── */
  #mute-btn {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: rgba(123,47,255,0.3);
    border: 1px solid rgba(180,79,255,0.5);
    color: #d0b0ff;
    font-size: 1.3rem;
    cursor: pointer;
    z-index: 100;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  #mute-btn:hover { background: rgba(123,47,255,0.5); transform: scale(1.1); }

  /* ─── Loading dots ─── */
  #loading {
    display: none; text-align: center;
    color: var(--violet); font-size: 1rem; letter-spacing: 2px;
    margin: 1rem 0;
  }
  #loading.show { display: block; }
  .dot { animation: blink 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }

  /* ─── Smoke effect ─── */
  #smoke {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 200px; pointer-events: none; z-index: 2;
    background: linear-gradient(to top, rgba(20,5,40,0.8) 0%, transparent 100%);
  }

  /* ─── Ripple Burst ─── */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 2px solid rgba(180,79,255,0.6);
    pointer-events: none;
    z-index: 5;
    animation: ripple-out 1s ease-out forwards;
  }
  @keyframes ripple-out {
    0% { width: 0; height: 0; opacity: 1; }
    100% { width: 300px; height: 300px; opacity: 0; margin-left: -150px; margin-top: -150px; }
  }

  @media (max-width: 480px) {
    #ball-wrap { width: 160px; height: 160px; }
    #crystal-ball { width: 160px; height: 160px; }
    h1 { font-size: 1.6rem; }
    .prediction-text { font-size: 1rem; }
  }
</style>
</head>
<body>

<div id="starfield"></div>
<div id="particles"></div>
<div id="smoke"></div>

<div id="app">
  <div id="title-block">
    <h1>🔮 AI Fortune Teller</h1>
    <p class="subtitle">The cosmos awaits your question…</p>
  </div>

  <div id="ball-wrap" onclick="onBallClick()">
    <svg class="ball-sparkles" id="sparkle-ring" viewBox="0 0 240 240">
      <circle cx="120" cy="20" r="4" fill="#f5c842"/>
      <circle cx="200" cy="60" r="3" fill="#b44fff"/>
      <circle cx="220" cy="140" r="4" fill="#f5c842"/>
      <circle cx="170" cy="210" r="3" fill="#b44fff"/>
      <circle cx="70" cy="210" r="4" fill="#f5c842"/>
      <circle cx="20" cy="140" r="3" fill="#b44fff"/>
      <circle cx="40" cy="60" r="4" fill="#f5c842"/>
      <circle cx="120" cy="10" r="2" fill="#fff"/>
    </svg>
    <div id="crystal-ball"></div>
  </div>
  <div class="ball-pedestal"></div>

  <div id="input-section">
    <input type="text" id="question-input"
      placeholder="Will I become rich? 💰"
      maxlength="120"
      onkeydown="if(event.key==='Enter') revealFortune()"
    />
    <br>
    <button id="reveal-btn" onclick="revealFortune()">✨ Reveal My Future ✨</button>
  </div>

  <div id="loading">
    <span>The spirits are speaking</span>
    <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>

  <div id="card-area">
    <div class="tarot-card" id="tarot-card">
      <div class="card-face card-front">
        <span class="card-corner tl">✦</span>
        <span class="card-corner tr">✦</span>
        <span class="card-corner bl">✦</span>
        <span class="card-corner br">✦</span>
        <div class="card-symbol" id="card-symbol">🌙</div>
        <div class="card-title" id="card-title">The Stars Speak</div>
        <div class="card-divider"></div>
        <p class="prediction-text" id="prediction-out"></p>
        <div class="card-footer">— AI Oracle —</div>
      </div>
    </div>
  </div>

  <div id="action-btns">
    <button class="action-btn" id="share-btn" onclick="shareFortune()">📋 Copy My Fortune</button>
    <button class="action-btn" id="again-btn" onclick="askAgain()">🔮 Ask Another Question</button>
  </div>
</div>

<div id="toast"></div>
<button id="mute-btn" title="Toggle music">🔊</button>

<script>
const predictions = [
  { sym:"☕", title:"The Bean Prophecy",    text:"Your future holds unlimited coffee… but also Monday meetings. The universe has a twisted sense of humor." },
  { sym:"🍕", title:"The Cosmic Slice",     text:"A mysterious opportunity approaches… almost certainly involving pizza. Do not question it. Just eat." },
  { sym:"💸", title:"The Pocket Revelation",text:"Great wealth is near. It sits, undiscovered, in the pocket of a jacket you haven't worn since 2021." },
  { sym:"😴", title:"The Nap Prophecy",     text:"Tremendous success awaits you — directly after a nap of legendary duration. The stars insist." },
  { sym:"🍟", title:"The Fry Warning",      text:"Beware the one who steals your fries. They have done it before. They will do it again. Guard your snacks." },
  { sym:"📱", title:"The Notification Curse",text:"You will soon receive 47 unread notifications. Most will be useless. One will change everything. Good luck finding it." },
  { sym:"🐱", title:"The Feline Oracle",    text:"A four-legged creature will bring you joy — or judge you silently. The spirits cannot tell which one yet." },
  { sym:"🌮", title:"The Taco Alignment",   text:"The planets align in your favor, forming what ancient astronomers called 'a perfect taco shape.' Eat accordingly." },
  { sym:"📚", title:"The Study Specter",    text:"Your destiny hinges entirely on whether you finish your homework. The cosmos are watching. Disappointed." },
  { sym:"🎲", title:"The Dice Decree",      text:"Fortune favors the bold — unless you're about to make a very bold financial decision at 2am. Sleep first." },
  { sym:"🦆", title:"The Duck Divination",  text:"An unexpected encounter with a duck will alter the course of your Tuesday. You have been warned." },
  { sym:"🌮", title:"The Algorithm Vision", text:"The AI has consulted the data. Your future involves: 73% mild inconvenience, 24% snacks, and 3% destiny." },
  { sym:"🔋", title:"The Battery Omen",     text:"Your phone will die at the worst possible moment. Charge it now. No, seriously. Right now." },
  { sym:"🌙", title:"The Midnight Prophecy",text:"At the stroke of midnight, something extraordinary will almost happen. You'll be asleep, but still — remarkable." },
  { sym:"🦋", title:"The Butterfly Effect", text:"A tiny decision you make this week will ripple across the universe. It will involve choosing between two sandwiches." },
];

const intros = [
  "The stars have aligned and the crystal reveals…",
  "Through the veil of time, the Oracle whispers…",
  "The ancient spirits have consulted your question…",
  "The cosmos tremble with your answer…",
  "From the depths of the mystical realm…",
];

let currentPrediction = "";
let audioCtx = null;
let musicPlaying = false;
let musicNodes = {};
let muted = false;
let revealed = false;

// ─── Stars ───
const sf = document.getElementById("starfield");
for (let i = 0; i < 180; i++) {
  const s = document.createElement("div");
  s.className = "star";
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  sf.appendChild(s);
}

// ─── Particles ───
const pc = document.getElementById("particles");
for (let i = 0; i < 25; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.cssText = `
    left:${Math.random()*100}%;
    --fd:${(Math.random()*12+6).toFixed(1)}s;
    --fdelay:-${(Math.random()*10).toFixed(1)}s;
    background: ${Math.random()>0.5?"#f5c842":"#b44fff"};
    width:${Math.random()*5+2}px; height:${Math.random()*5+2}px;
  `;
  pc.appendChild(p);
}

// ─── Web Audio Music ───
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  playAmbient();
}

function playAmbient() {
  if (!audioCtx) return;
  const master = audioCtx.createGain();
  master.gain.value = muted ? 0 : 0.18;
  master.connect(audioCtx.destination);
  musicNodes.master = master;

  const notes = [130.81, 146.83, 164.81, 196.00, 220.00, 246.94, 261.63];
  const chords = [
    [0,2,4], [1,3,5], [0,2,6], [1,4,5],
    [0,3,5], [2,4,6], [0,1,4]
  ];

  function playChord(time) {
    const chord = chords[Math.floor(Math.random()*chords.length)];
    chord.forEach(ni => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = notes[ni] * (Math.random() > 0.5 ? 2 : 1);
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(0.12, time + 0.8);
      g.gain.linearRampToValueAtTime(0, time + 4.5);
      osc.connect(g);
      g.connect(master);
      osc.start(time);
      osc.stop(time + 5);
    });
  }

  function scheduleLoop(when) {
    playChord(when);
    const id = setTimeout(() => scheduleLoop(audioCtx.currentTime), 4500);
    musicNodes.loopId = id;
  }
  scheduleLoop(audioCtx.currentTime);

  // drone pad
  const drone = audioCtx.createOscillator();
  const dg = audioCtx.createGain();
  drone.type = "triangle";
  drone.frequency.value = 65.4;
  dg.gain.value = 0.06;
  drone.connect(dg);
  dg.connect(master);
  drone.start();
  musicNodes.drone = drone;
  musicNodes.droneGain = dg;
  musicPlaying = true;
}

function playSound(type) {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  if (type === "sparkle") {
    [880, 1047, 1319, 1568].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0, t + i*0.08);
      g.gain.linearRampToValueAtTime(0.15, t + i*0.08 + 0.05);
      g.gain.linearRampToValueAtTime(0, t + i*0.08 + 0.3);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + i*0.08); o.stop(t + i*0.08 + 0.35);
    });
  } else if (type === "flip") {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(440, t);
    o.frequency.linearRampToValueAtTime(220, t + 0.4);
    g.gain.setValueAtTime(0.2, t);
    g.gain.linearRampToValueAtTime(0, t + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.55);
  } else if (type === "glow") {
    [200, 280, 350].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.12, t + i*0.1);
      g.gain.linearRampToValueAtTime(0, t + i*0.1 + 0.6);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + i*0.1); o.stop(t + i*0.1 + 0.7);
    });
  }
}

// ─── Mute Toggle ───
document.getElementById("mute-btn").onclick = function() {
  initAudio();
  muted = !muted;
  this.textContent = muted ? "🔇" : "🔊";
  if (musicNodes.master) musicNodes.master.gain.value = muted ? 0 : 0.18;
};

// ─── Ball click ───
function onBallClick() {
  initAudio();
  playSound("glow");
  const ball = document.getElementById("crystal-ball");
  ball.classList.add("active");
  setTimeout(() => ball.classList.remove("active"), 1200);
  spawnRipple();
}

function spawnRipple() {
  const r = document.createElement("div");
  r.className = "ripple";
  const bw = document.getElementById("ball-wrap");
  const rect = bw.getBoundingClientRect();
  r.style.left = (rect.left + rect.width/2) + "px";
  r.style.top = (rect.top + rect.height/2) + "px";
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 1100);
}

// ─── Fortune Reveal ───
async function revealFortune() {
  initAudio();
  const q = document.getElementById("question-input").value.trim();
  if (!q) {
    showToast("✨ Ask the Oracle a question first…");
    return;
  }
  if (revealed) { askAgain(); return; }

  revealed = true;
  const ball = document.getElementById("crystal-ball");
  ball.classList.add("active");
  document.getElementById("sparkle-ring").classList.add("show");
  playSound("glow");
  spawnRipple();
  spawnBurstParticles();

  document.getElementById("reveal-btn").disabled = true;
  document.getElementById("reveal-btn").textContent = "🔮 Reading your fate…";
  document.getElementById("loading").classList.add("show");
  document.getElementById("card-area").classList.remove("show");
  document.getElementById("action-btns").classList.remove("show");

  // dramatic delay
  await wait(2200);
  ball.classList.remove("active");
  document.getElementById("sparkle-ring").classList.remove("show");

  // pick prediction
  const p = predictions[Math.floor(Math.random() * predictions.length)];
  const intro = intros[Math.floor(Math.random() * intros.length)];
  currentPrediction = `"${p.text}"`;

  document.getElementById("loading").classList.remove("show");
  document.getElementById("card-symbol").textContent = p.sym;
  document.getElementById("card-title").textContent = p.title;
  document.getElementById("prediction-out").textContent = intro + " " + p.text;

  // reset & show card
  const card = document.getElementById("card-area");
  const tc = document.getElementById("tarot-card");
  tc.style.animation = "none";
  tc.offsetHeight; // reflow
  tc.style.animation = "";

  card.classList.add("show");
  playSound("flip");
  await wait(600);
  playSound("sparkle");

  document.getElementById("action-btns").classList.add("show");
  document.getElementById("reveal-btn").textContent = "✨ Ask Another Question ✨";
  document.getElementById("reveal-btn").disabled = false;
}

function askAgain() {
  revealed = false;
  document.getElementById("question-input").value = "";
  document.getElementById("card-area").classList.remove("show");
  document.getElementById("action-btns").classList.remove("show");
  document.getElementById("reveal-btn").textContent = "✨ Reveal My Future ✨";
  document.getElementById("question-input").focus();
  playSound("sparkle");
}

function shareFortune() {
  const txt = document.getElementById("prediction-out").textContent;
  const full = `🔮 My AI Fortune: ${txt}\n\n— AI Fortune Teller`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(full).then(() => showToast("✨ Fortune copied to clipboard!"));
  } else {
    const ta = document.createElement("textarea");
    ta.value = full;
    document.body.appendChild(ta);
    ta.select(); document.execCommand("copy");
    ta.remove();
    showToast("✨ Fortune copied!");
  }
}

function spawnBurstParticles() {
  const bw = document.getElementById("ball-wrap");
  const rect = bw.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.style.cssText = `
      position:fixed; z-index:50; pointer-events:none;
      width:${Math.random()*6+4}px; height:${Math.random()*6+4}px;
      border-radius:50%;
      background:${Math.random()>0.5?"#f5c842":"#b44fff"};
      left:${cx}px; top:${cy}px;
    `;
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 150 + 60;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.animate([
      { transform:"translate(-50%,-50%) scale(1)", opacity:1 },
      { transform:`translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity:0 }
    ], { duration: 900 + Math.random()*400, easing:"ease-out" }).onfinish = () => p.remove();
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// autostart audio on first interaction
document.addEventListener("click", initAudio, { once: true });
document.addEventListener("keydown", initAudio, { once: true });
</script>
