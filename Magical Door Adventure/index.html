<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mysterious Door</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-glow: #ffd700;
    --dark-bg: #050508;
    --fog-color: rgba(120, 80, 200, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark-bg);
    font-family: 'Crimson Text', Georgia, serif;
    cursor: default;
    user-select: none;
  }

  /* ─── CANVAS (star field / world particles) ─── */
  #canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── OPENING SCENE ─── */
  #opening {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 1.2s ease;
  }
  #opening.fade-out { opacity: 0; pointer-events: none; }

  .tagline-top {
    font-family: 'Cinzel Decorative', serif;
    color: #b0a0d0;
    font-size: clamp(0.7rem, 2vw, 1rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeSlideDown 1.4s 0.6s ease forwards;
    text-shadow: 0 0 20px rgba(150,100,255,0.5);
  }

  /* ─── DOOR ─── */
  #door-wrap {
    position: relative;
    width: clamp(140px, 22vw, 220px);
    height: clamp(240px, 38vw, 380px);
    cursor: pointer;
    perspective: 900px;
    transform-style: preserve-3d;
    z-index: 11;
  }

  /* arch surround */
  .door-arch {
    position: absolute;
    inset: -20px -24px;
    border-radius: 50% 50% 0 0 / 30% 30% 0 0;
    background: linear-gradient(180deg, #2a1a50 0%, #1a1030 100%);
    box-shadow:
      0 0 40px 10px rgba(160, 80, 255, 0.35),
      0 0 80px 20px rgba(100, 40, 200, 0.2),
      inset 0 0 30px rgba(0,0,0,0.8);
    animation: archPulse 3s ease-in-out infinite;
  }

  @keyframes archPulse {
    0%,100% { box-shadow: 0 0 40px 10px rgba(160,80,255,.35), 0 0 80px 20px rgba(100,40,200,.2), inset 0 0 30px rgba(0,0,0,.8); }
    50%      { box-shadow: 0 0 60px 16px rgba(200,120,255,.55), 0 0 120px 30px rgba(140,60,255,.35), inset 0 0 30px rgba(0,0,0,.8); }
  }

  /* door frame */
  .door-frame {
    position: absolute; inset: 0;
    border: 3px solid var(--gold);
    border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, #1a0e30 0%, #0d0820 100%);
    box-shadow: 0 0 30px rgba(200,168,76,0.4), inset 0 0 20px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  /* inner door glow slit */
  .door-frame::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,200,80,0.12) 0%, transparent 70%);
    animation: innerGlow 2.5s ease-in-out infinite alternate;
  }
  @keyframes innerGlow {
    from { opacity: 0.4; }
    to   { opacity: 1; }
  }

  /* door panel lines */
  .door-panel {
    position: absolute;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 2px;
  }
  .door-panel.top    { top: 10%; left: 10%; right: 10%; height: 35%; }
  .door-panel.bottom { top: 52%; left: 10%; right: 10%; bottom: 8%; }

  /* door handle */
  .door-handle {
    position: absolute;
    right: 14%; top: 50%;
    width: 10px; height: 24px;
    background: radial-gradient(circle at 40% 30%, #ffd700, #a07820);
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 8px rgba(255,200,0,0.6);
    transform: translateY(-50%);
  }

  /* door hinge */
  .door-hinge {
    position: absolute;
    left: 8%;
    width: 8px; height: 18px;
    background: linear-gradient(90deg, #806030, #ffd700, #806030);
    border-radius: 2px;
    box-shadow: 0 0 4px rgba(255,200,0,0.4);
  }
  .door-hinge.top    { top: 18%; }
  .door-hinge.bottom { top: 62%; }

  /* door 3-D open animation — rotates left panel */
  #door-wrap.opening .door-frame {
    animation: doorSwing 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
    transform-origin: left center;
  }
  @keyframes doorSwing {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(-78deg); opacity: 0.2; }
  }

  /* light burst from behind door */
  .door-light {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, white 0%, rgba(255,220,100,0.9) 25%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 12;
    transition: opacity 0.3s;
  }
  #door-wrap.opening .door-light {
    animation: burstLight 1.1s ease forwards;
  }
  @keyframes burstLight {
    0%   { opacity: 0; }
    45%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .tagline-bottom {
    margin-top: 2.2rem;
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 2.4vw, 1.15rem);
    color: rgba(200,180,240,0.75);
    letter-spacing: 0.06em;
    opacity: 0;
    animation: fadeSlideDown 1.4s 1.2s ease forwards;
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── SCREEN FLASH OVERLAY ─── */
  #flash {
    position: fixed; inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.15s;
  }
  #flash.active { opacity: 1; }

  /* ─── WORLD SCENE ─── */
  #world {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.4s ease;
    text-align: center;
    padding: 2rem;
  }
  #world.visible { opacity: 1; pointer-events: all; }

  /* world backgrounds */
  #world.alien {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(120,0,200,0.6) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(0,200,160,0.35) 0%, transparent 50%),
      linear-gradient(160deg, #0a0018 0%, #180030 40%, #050020 100%);
  }
  #world.underwater {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(0,120,220,0.7) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 90%, rgba(0,60,180,0.5) 0%, transparent 50%),
      linear-gradient(180deg, #000a1a 0%, #001838 40%, #000d28 100%);
  }
  #world.forest {
    background:
      radial-gradient(ellipse at 50% 10%, rgba(0,180,60,0.45) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(80,220,60,0.25) 0%, transparent 40%),
      linear-gradient(180deg, #000a02 0%, #001a04 40%, #000d02 100%);
  }

  .world-emoji { font-size: clamp(3rem, 10vw, 6rem); margin-bottom: 1.2rem; animation: floatEmoji 3s ease-in-out infinite; }
  @keyframes floatEmoji { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

  .world-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 4.5vw, 2.6rem);
    font-weight: 700;
    margin-bottom: 1rem;
    text-shadow: 0 0 30px currentColor;
  }
  .alien    .world-title { color: #b060ff; }
  .underwater .world-title { color: #40d0ff; }
  .forest   .world-title { color: #60ff80; }

  .world-desc {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2.8vw, 1.3rem);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 2.5rem;
  }
  .alien    .world-desc { color: #d0a0ff; }
  .underwater .world-desc { color: #a0e0ff; }
  .forest   .world-desc { color: #a0ffb0; }

  /* ─── BUTTONS ─── */
  .btn-restart {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.9em 2.2em;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-restart:hover { transform: translateY(-3px) scale(1.04); }

  .alien     .btn-restart { background: linear-gradient(135deg, #6020b0, #b040ff); color: #f0d0ff; box-shadow: 0 0 20px rgba(160,60,255,0.6); }
  .underwater .btn-restart { background: linear-gradient(135deg, #0050a0, #00a8e0); color: #d0f0ff; box-shadow: 0 0 20px rgba(0,160,240,0.6); }
  .forest    .btn-restart { background: linear-gradient(135deg, #005020, #00c040); color: #d0ffd8; box-shadow: 0 0 20px rgba(0,200,80,0.6); }

  /* ─── MUTE BUTTON ─── */
  #mute-btn {
    position: fixed;
    bottom: 1.4rem; right: 1.4rem;
    z-index: 200;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    color: white;
    backdrop-filter: blur(8px);
    transition: background 0.2s, transform 0.2s;
    display: none;
  }
  #mute-btn:hover { background: rgba(255,255,255,0.16); transform: scale(1.1); }
  #mute-btn.show { display: flex; }

  /* ─── WORLD-SPECIFIC DECORATIONS ─── */

  /* Alien glowing plants */
  .alien-plant {
    position: fixed;
    bottom: 0; width: 60px;
    pointer-events: none; z-index: 5;
    animation: sway 4s ease-in-out infinite;
  }
  @keyframes sway { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }

  /* Underwater bubbles */
  .bubble {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(100,200,255,0.15));
    border: 1px solid rgba(150,220,255,0.4);
    pointer-events: none; z-index: 5;
    animation: rise linear infinite;
  }
  @keyframes rise { from { transform: translateY(0) translateX(0); opacity: 0.8; } to { transform: translateY(-110vh) translateX(20px); opacity: 0; } }

  /* Fish */
  .fish {
    position: fixed;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    pointer-events: none; z-index: 5;
    animation: swimFish linear infinite;
  }
  @keyframes swimFish {
    from { transform: translateX(110vw); }
    to   { transform: translateX(-20vw); }
  }

  /* Forest fireflies */
  .firefly {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ffe060;
    box-shadow: 0 0 8px 3px rgba(255,220,60,0.7);
    pointer-events: none; z-index: 5;
    animation: flyAround ease-in-out infinite, blink ease-in-out infinite;
  }
  @keyframes flyAround {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(40px, -60px); }
    50%  { transform: translate(-30px, -30px); }
    75%  { transform: translate(20px, -80px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.1; } }

  /* Alien floating rocks */
  .rock {
    position: fixed;
    font-size: clamp(1.5rem, 5vw, 2.8rem);
    pointer-events: none; z-index: 5;
    animation: floatRock ease-in-out infinite;
    opacity: 0.75;
  }
  @keyframes floatRock {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-30px) rotate(8deg); }
  }

  /* Forest trees silhouette */
  .tree-row {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 35vh; pointer-events: none; z-index: 4;
    background: linear-gradient(180deg, transparent 0%, rgba(0,10,2,0.95) 100%);
  }
  .tree-row svg { width: 100%; height: 100%; }

  /* Fog strip */
  .fog-strip {
    position: fixed;
    bottom: 0; left: -50%; right: -50%;
    height: 30vh;
    background: radial-gradient(ellipse at 50% 100%, rgba(80,180,80,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 3;
    animation: fogDrift 12s ease-in-out infinite alternate;
  }
  @keyframes fogDrift { from { transform: translateX(-5%); } to { transform: translateX(5%); } }

  /* Underwater seabed */
  .seabed {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 120px; pointer-events: none; z-index: 4;
    background: linear-gradient(180deg, transparent, rgba(0,10,40,0.9));
  }

  /* Alien ground glow */
  .alien-ground {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 80px; pointer-events: none; z-index: 3;
    background: linear-gradient(180deg, transparent, rgba(100,0,160,0.5));
    box-shadow: 0 -20px 60px rgba(140,0,220,0.3);
  }

  /* Scan lines subtle overlay (alien feel) */
  .scanlines {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  }

  /* ─── OPENING PARTICLES ─── */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none; z-index: 1;
    animation: particleDrift linear infinite;
  }
  @keyframes particleDrift {
    from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    to   { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    .tagline-top  { letter-spacing: 0.15em; }
    .tagline-bottom { font-size: 0.9rem; }
    .world-title  { margin-top: 0.5rem; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="scanlines"></div>
<div id="flash"></div>

<!-- ══════════════ OPENING SCENE ══════════════ -->
<div id="opening">
  <div class="tagline-top">A mysterious door stands before you…</div>

  <div id="door-wrap" onclick="openDoor()">
    <div class="door-arch"></div>
    <div class="door-frame">
      <div class="door-panel top"></div>
      <div class="door-panel bottom"></div>
      <div class="door-hinge top"></div>
      <div class="door-hinge bottom"></div>
      <div class="door-handle"></div>
    </div>
    <div class="door-light"></div>
  </div>

  <div class="tagline-bottom">Click to discover what lies beyond.</div>
</div>

<!-- ══════════════ WORLD SCENE ══════════════ -->
<div id="world">
  <div class="world-emoji" id="worldEmoji"></div>
  <h1 class="world-title" id="worldTitle"></h1>
  <p  class="world-desc"  id="worldDesc"></p>
  <button class="btn-restart" onclick="resetAdventure()">✦ Open Another Door ✦</button>
</div>

<!-- ══════════════ MUTE BUTTON ══════════════ -->
<button id="mute-btn" onclick="toggleMute()" title="Toggle music">🔊</button>

<!-- ══════════════ AUDIO ══════════════ -->
<!-- Using Web Audio API to synthesize music — no external files needed -->
<script>
// ════════════════════════════════════════════
//   WEB AUDIO SYNTHESISER  (no file deps)
// ════════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let currentNodes = [];
let muted = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.38, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);
}

function stopAllAudio() {
  currentNodes.forEach(n => { try { n.stop(); } catch(e){} });
  currentNodes = [];
}

/* ── simple reverb ── */
function createReverb(ctx, decay = 2.5) {
  const conv = ctx.createConvolver();
  const sr = ctx.sampleRate;
  const len = sr * decay;
  const buf = ctx.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.4);
  }
  conv.buffer = buf;
  return conv;
}

/* ── play a looping pad note ── */
function padNote(freq, type, startT, duration, vol, reverb, lfoRate=0) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  if (lfoRate) {
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.setValueAtTime(lfoRate, startT);
    lfoGain.gain.setValueAtTime(freq * 0.012, startT);
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start(startT);
    currentNodes.push(lfo);
  }
  gain.gain.setValueAtTime(0, startT);
  gain.gain.linearRampToValueAtTime(vol, startT + 0.4);
  gain.gain.setValueAtTime(vol, startT + duration - 0.5);
  gain.gain.linearRampToValueAtTime(0, startT + duration);
  osc.connect(gain);
  if (reverb) {
    gain.connect(reverb);
    reverb.connect(masterGain);
  } else {
    gain.connect(masterGain);
  }
  osc.start(startT);
  osc.stop(startT + duration + 0.1);
  currentNodes.push(osc, gain);
}

/* ── door music: eerie low drone ── */
function playDoorMusic() {
  initAudio();
  stopAllAudio();
  const rev = createReverb(audioCtx, 3);
  const t = audioCtx.currentTime;
  const loop = () => {
    if (muted) return;
    const now = audioCtx.currentTime;
    padNote(55,  'sine',     now, 6, 0.14, rev, 0.2);
    padNote(82,  'triangle', now, 6, 0.06, rev, 0.15);
    padNote(110, 'sine',     now, 6, 0.04, rev, 0.08);
    setTimeout(loop, 5400);
  };
  loop();
}

/* ── alien music: high sci-fi tones ── */
function playAlienMusic() {
  stopAllAudio();
  const rev = createReverb(audioCtx, 2);
  const notes = [220, 277, 330, 415, 523, 659];
  let step = 0;
  const loop = () => {
    if (muted) return;
    const now = audioCtx.currentTime;
    const f = notes[step % notes.length];
    padNote(f,       'sawtooth', now, 1.8, 0.06, rev, 6);
    padNote(f*2,     'sine',     now, 1.8, 0.03, rev, 3);
    padNote(f*0.5,   'triangle', now, 2.2, 0.05, rev);
    step++;
    setTimeout(loop, 1600);
  };
  loop();
}

/* ── underwater music: slow watery hum ── */
function playUnderwaterMusic() {
  stopAllAudio();
  const rev = createReverb(audioCtx, 4);
  const chords = [[130,164,196],[116,146,174],[98,123,147],[110,138,165]];
  let ci = 0;
  const loop = () => {
    if (muted) return;
    const now = audioCtx.currentTime;
    chords[ci % chords.length].forEach((f,i) => {
      padNote(f, 'sine', now + i*0.1, 4, 0.07, rev, 0.3);
    });
    ci++;
    setTimeout(loop, 3600);
  };
  loop();
}

/* ── forest music: bright sparkling arpeggios ── */
function playForestMusic() {
  stopAllAudio();
  const rev = createReverb(audioCtx, 2.5);
  const arp = [261,329,392,523,659,523,392,329];
  let ai = 0;
  const playNote = () => {
    if (muted) return;
    const now = audioCtx.currentTime;
    padNote(arp[ai % arp.length], 'triangle', now, 0.6, 0.09, rev);
    ai++;
    setTimeout(playNote, 260);
  };
  // base drone
  const dronLoop = () => {
    if (muted) return;
    const now = audioCtx.currentTime;
    padNote(65, 'sine', now, 4, 0.06, rev, 0.2);
    setTimeout(dronLoop, 3800);
  };
  playNote();
  dronLoop();
}

function toggleMute() {
  muted = !muted;
  if (masterGain) masterGain.gain.setTargetAtTime(muted ? 0 : 0.38, audioCtx.currentTime, 0.1);
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
}

// ════════════════════════════════════════════
//   CANVAS  (stars / world atmosphere)
// ════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx2 = canvas.getContext('2d');
let cW, cH, stars = [], animReq;

function resizeCanvas() {
  cW = canvas.width  = window.innerWidth;
  cH = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function makeStars(n) {
  stars = Array.from({length: n}, () => ({
    x: Math.random()*cW, y: Math.random()*cH,
    r: Math.random()*1.5, o: Math.random(),
    s: 0.002 + Math.random()*0.006
  }));
}
makeStars(180);

function drawStars() {
  ctx2.clearRect(0,0,cW,cH);
  stars.forEach(s => {
    s.o += s.s;
    if (s.o > 1 || s.o < 0) s.s *= -1;
    ctx2.globalAlpha = s.o * 0.8;
    ctx2.fillStyle = '#fff';
    ctx2.beginPath();
    ctx2.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx2.fill();
  });
  ctx2.globalAlpha = 1;
}

function starLoop() {
  drawStars();
  animReq = requestAnimationFrame(starLoop);
}
starLoop();

// ════════════════════════════════════════════
//   OPENING PARTICLES
// ════════════════════════════════════════════
function spawnParticles() {
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random()*5;
    p.style.cssText = `
      left:${Math.random()*100}vw;
      width:${size}px; height:${size}px;
      background:rgba(${160+Math.random()*80},${60+Math.random()*60},${220+Math.random()*35},0.55);
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${-Math.random()*12}s;
    `;
    document.body.appendChild(p);
  }
}
spawnParticles();

// ════════════════════════════════════════════
//   WORLDS DATA
// ════════════════════════════════════════════
const worlds = [
  {
    id: 'alien',
    emoji: '👽',
    title: 'Unknown Alien World',
    desc: 'Welcome to an unknown alien world. Strange life forms glow in the darkness, and the very atmosphere hums with unearthly energy.',
    music: playAlienMusic
  },
  {
    id: 'underwater',
    emoji: '🌊',
    title: 'Hidden Underwater Civilization',
    desc: 'You have discovered a hidden underwater civilization. Ancient spires rise from the ocean floor, still glowing after a thousand years.',
    music: playUnderwaterMusic
  },
  {
    id: 'forest',
    emoji: '🌿',
    title: 'The Enchanted Forest',
    desc: 'You have stepped into an enchanted forest. Every leaf shimmers with old magic, and the fireflies carry whispered secrets through the dark.',
    music: playForestMusic
  }
];

let currentWorld = null;

// ════════════════════════════════════════════
//   WORLD DECORATIONS
// ════════════════════════════════════════════
function clearDecorations() {
  document.querySelectorAll('.deco').forEach(el => el.remove());
}

function addAlienDecorations() {
  // glowing alien plants (SVG)
  const positions = [5, 15, 72, 85, 92];
  positions.forEach((left, i) => {
    const d = document.createElement('div');
    d.className = 'alien-plant deco';
    d.style.cssText = `left:${left}vw; animation-delay:${i*0.7}s; animation-duration:${3+i*0.5}s;`;
    const hue = 260 + i*30;
    d.innerHTML = `<svg viewBox="0 0 60 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="20" rx="20" ry="12" fill="hsl(${hue},90%,55%)" opacity="0.9" filter="url(#glow${i})"/>
      <rect x="28" y="20" width="4" height="80" fill="hsl(${hue},70%,40%)" rx="2"/>
      <ellipse cx="30" cy="20" rx="14" ry="8" fill="hsl(${hue+20},95%,70%)" opacity="0.6"/>
      <defs><filter id="glow${i}"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    </svg>`;
    document.body.appendChild(d);
  });

  // floating rocks
  const rocks = ['🪨','🌑','⬛'];
  rocks.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'rock deco';
    d.textContent = r;
    d.style.cssText = `left:${10+i*30}vw; top:${15+i*12}vh; animation-duration:${5+i*2}s; animation-delay:${i*1.2}s;`;
    document.body.appendChild(d);
  });

  // ground glow
  const g = document.createElement('div');
  g.className = 'alien-ground deco';
  document.body.appendChild(g);
}

function addUnderwaterDecorations() {
  // bubbles
  for (let i = 0; i < 26; i++) {
    const b = document.createElement('div');
    b.className = 'bubble deco';
    const s = 4 + Math.random()*18;
    b.style.cssText = `
      left:${Math.random()*100}vw;
      bottom:${-s}px;
      width:${s}px; height:${s}px;
      animation-duration:${4+Math.random()*8}s;
      animation-delay:${-Math.random()*8}s;
    `;
    document.body.appendChild(b);
  }

  // fish
  const fishTypes = ['🐠','🐟','🐡','🦑'];
  fishTypes.forEach((f, i) => {
    const d = document.createElement('div');
    d.className = 'fish deco';
    d.textContent = f;
    d.style.cssText = `top:${20+i*16}vh; animation-duration:${8+i*4}s; animation-delay:${-i*3}s;`;
    document.body.appendChild(d);
  });

  // seabed
  const sb = document.createElement('div');
  sb.className = 'seabed deco';
  document.body.appendChild(sb);
}

function addForestDecorations() {
  // fireflies
  for (let i = 0; i < 30; i++) {
    const ff = document.createElement('div');
    ff.className = 'firefly deco';
    ff.style.cssText = `
      left:${Math.random()*100}vw;
      top:${20+Math.random()*65}vh;
      animation-duration:${4+Math.random()*8}s, ${1.5+Math.random()*2}s;
      animation-delay:${-Math.random()*8}s, ${-Math.random()*2}s;
    `;
    document.body.appendChild(ff);
  }

  // tree silhouette row
  const tr = document.createElement('div');
  tr.className = 'tree-row deco';
  tr.innerHTML = `<svg viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    ${Array.from({length:14}, (_,i) => {
      const x = i*75+20, h = 80+Math.random()*100, w = 30+Math.random()*30;
      return `<polygon points="${x},200 ${x+w/2},${200-h} ${x+w},200" fill="#001a04" opacity="0.95"/>`;
    }).join('')}
  </svg>`;
  document.body.appendChild(tr);

  // fog
  const fog = document.createElement('div');
  fog.className = 'fog-strip deco';
  document.body.appendChild(fog);
}

// ════════════════════════════════════════════
//   DOOR INTERACTION
// ════════════════════════════════════════════
let doorOpened = false;

function openDoor() {
  if (doorOpened) return;
  doorOpened = true;

  initAudio();

  const doorWrap = document.getElementById('door-wrap');
  doorWrap.classList.add('opening');

  setTimeout(() => {
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 300);
  }, 700);

  setTimeout(() => {
    document.getElementById('opening').classList.add('fade-out');
    revealWorld();
  }, 1000);
}

function revealWorld() {
  currentWorld = worlds[Math.floor(Math.random() * worlds.length)];
  const w = document.getElementById('world');
  w.className = 'visible ' + currentWorld.id;

  document.getElementById('worldEmoji').textContent = currentWorld.emoji;
  document.getElementById('worldTitle').textContent = currentWorld.title;
  document.getElementById('worldDesc').textContent  = currentWorld.desc;

  clearDecorations();
  if      (currentWorld.id === 'alien')      addAlienDecorations();
  else if (currentWorld.id === 'underwater') addUnderwaterDecorations();
  else if (currentWorld.id === 'forest')     addForestDecorations();

  currentWorld.music();

  const muteBtn = document.getElementById('mute-btn');
  muteBtn.classList.add('show');
}

function resetAdventure() {
  stopAllAudio();
  clearDecorations();
  doorOpened = false;

  const w = document.getElementById('world');
  w.className = '';

  const opening = document.getElementById('opening');
  opening.classList.remove('fade-out');
  opening.style.opacity = '1';

  const doorWrap = document.getElementById('door-wrap');
  doorWrap.classList.remove('opening');

  // reset door frame animation
  const frame = doorWrap.querySelector('.door-frame');
  frame.style.animation = 'none';
  frame.offsetHeight; // reflow
  frame.style.animation = '';

  document.getElementById('mute-btn').classList.remove('show');

  // restart door ambiance
  playDoorMusic();
}

// ════════════════════════════════════════════
//   START DOOR MUSIC ON FIRST INTERACTION
// ════════════════════════════════════════════
function startDoorMusicOnce() {
  playDoorMusic();
  document.removeEventListener('click', startDoorMusicOnce);
  document.removeEventListener('touchstart', startDoorMusicOnce);
}
document.addEventListener('click',      startDoorMusicOnce, { once: true });
document.addEventListener('touchstart', startDoorMusicOnce, { once: true });
</script>
</body>
